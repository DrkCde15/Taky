name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: configure
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build -- --base="${{ steps.configure.outputs.base_path }}"
        env:
          VITE_BASE_PATH: ${{ steps.configure.outputs.base_path }}

      - name: Find build output
        id: find_out
        run: |
          if [ -d dist ]; then
            echo "dir=dist" >> "$GITHUB_OUTPUT"
            ls -la dist
          elif [ -d .output/public ]; then
            echo "dir=.output/public" >> "$GITHUB_OUTPUT"
            ls -la .output/public
          elif [ -d .output ]; then
            echo "dir=.output" >> "$GITHUB_OUTPUT"
            ls -la .output
          else
            echo "=== Searching for index.html ==="
            find . -name "index.html" -type f 2>/dev/null
            exit 1
          fi

      - name: Copy 404.html for SPA routing
        run: |
          DIR="${{ steps.find_out.outputs.dir }}"
          cp "$DIR/index.html" "$DIR/404.html"

      - name: Create .nojekyll
        run: touch "${{ steps.find_out.outputs.dir }}/.nojekyll"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/${{ steps.find_out.outputs.dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
